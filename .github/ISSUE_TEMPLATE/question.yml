name: "Question"
description: "No question is too basic. If something confused you, it's probably confusing others too."
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Ask anything — about how visualpy works, how to set it up, what a feature does, or whether something is supposed to behave the way it does. There are no stupid questions.

  - type: textarea
    id: question
    attributes:
      label: What's on your mind?
      placeholder: "I'm trying to understand..."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context (optional)
      description: What were you trying to do when the question came up? This helps us give a better answer.
      placeholder: "I was running visualpy on a project with..."
