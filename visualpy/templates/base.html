<!DOCTYPE html>
<html lang="en" x-data="{ dark: localStorage.getItem('theme') === 'dark', biz: localStorage.getItem('viewMode') !== 'technical' }"
      x-init="$watch('dark', v => { localStorage.setItem('theme', v ? 'dark' : 'light'); document.documentElement.classList.toggle('dark', v); window.reRenderMermaid && window.reRenderMermaid(v) }); $watch('biz', v => { localStorage.setItem('viewMode', v ? 'business' : 'technical'); window.switchViewMode && window.switchViewMode(v) }); document.documentElement.classList.toggle('dark', dark)"
      :class="{ 'dark': dark }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}visualpy{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/htmx.org@2/dist/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <nav class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="/" class="flex items-center gap-1.5 text-lg font-semibold text-blue-600 dark:text-blue-400 hover:underline">
                    <span aria-hidden="true">&larr;</span>
                    <span>visualpy</span>
                </a>
                {% block breadcrumb %}{% endblock %}
            </div>
            <div class="flex items-center gap-2">
                <button @click="biz = !biz"
                        class="px-2.5 py-1.5 rounded-lg text-xs font-medium border transition"
                        :class="biz ? 'bg-blue-50 dark:bg-blue-900/30 border-blue-300 dark:border-blue-600 text-blue-700 dark:text-blue-300' : 'bg-gray-50 dark:bg-gray-800 border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-400'"
                        id="view-toggle"
                        :title="biz ? 'Switch to technical view' : 'Switch to business view'">
                    <span x-show="biz">Business</span>
                    <span x-show="!biz">Technical</span>
                </button>
                <button @click="dark = !dark"
                        class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition"
                        aria-label="Toggle dark mode"
                        id="dark-toggle"
                        title="Toggle dark mode">
                    <span x-show="!dark" class="text-xl">&#9789;</span>
                    <span x-show="dark" class="text-xl">&#9788;</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

        function initMermaid(isDark) {
            mermaid.initialize({
                startOnLoad: false,
                theme: isDark ? 'dark' : 'default',
                securityLevel: 'loose',
                flowchart: { useMaxWidth: true, htmlLabels: true },
            });
        }

        // Store original source BEFORE mermaid.run() replaces it with SVG.
        document.querySelectorAll('.mermaid').forEach(el => {
            if (!el.getAttribute('data-mermaid-src')) {
                el.setAttribute('data-mermaid-src', el.textContent.trim());
            }
        });

        initMermaid(document.documentElement.classList.contains('dark'));
        try {
            await mermaid.run();
        } catch (err) {
            console.error('[visualpy] Mermaid render failed:', err);
            document.querySelectorAll('.mermaid').forEach(el => {
                if (!el.querySelector('svg')) {
                    el.innerHTML = '<p class="text-sm text-red-600 dark:text-red-400">Diagram failed to render. Check browser console.</p>';
                }
            });
        }

        window.reRenderMermaid = async function(isDark) {
            initMermaid(isDark);
            document.querySelectorAll('.mermaid').forEach(el => {
                const code = el.getAttribute('data-mermaid-src');
                if (code) {
                    el.removeAttribute('data-processed');
                    el.innerHTML = code;
                }
            });
            try {
                await mermaid.run();
            } catch (err) {
                console.error('[visualpy] Mermaid re-render failed:', err);
            }
        };

        window.mermaidModule = mermaid;
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
