<!DOCTYPE html>
<html lang="en" x-data="{ dark: localStorage.getItem('theme') === 'dark', viewMode: localStorage.getItem('viewMode') || 'business' }"
      x-init="$watch('dark', v => { localStorage.setItem('theme', v ? 'dark' : 'light'); document.documentElement.classList.toggle('dark', v); window.reRenderMermaid && window.reRenderMermaid(v) }); $watch('viewMode', v => { localStorage.setItem('viewMode', v); window.switchViewMode && window.switchViewMode(v === 'business') }); document.documentElement.classList.toggle('dark', dark)"
      :class="{ 'dark': dark }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}visualpy{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/htmx.org@2/dist/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <nav class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="/" class="flex items-center gap-1.5 text-lg font-semibold text-blue-600 dark:text-blue-400 hover:underline">
                    <span aria-hidden="true">&larr;</span>
                    <span>visualpy</span>
                </a>
                {% block breadcrumb %}{% endblock %}
            </div>
            <div class="flex items-center gap-2">
                <button @click="viewMode = viewMode === 'business' ? 'technical' : 'business'"
                        class="px-3 py-1.5 rounded-full text-xs font-medium border transition-all duration-200"
                        :class="viewMode === 'business' ? 'bg-blue-50 dark:bg-blue-900/30 border-blue-200 dark:border-blue-700 text-blue-600 dark:text-blue-300 shadow-sm' : 'bg-gray-50 dark:bg-gray-800 border-gray-200 dark:border-gray-600 text-gray-500 dark:text-gray-400'"
                        id="view-toggle"
                        :title="viewMode === 'business' ? 'Switch to technical view' : 'Switch to business view'">
                    <span x-show="viewMode === 'business'" class="flex items-center gap-1"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg> Code</span>
                    <span x-show="viewMode === 'technical'" class="flex items-center gap-1"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg> Simple</span>
                </button>
                <button @click="dark = !dark"
                        class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition"
                        aria-label="Toggle dark mode"
                        id="dark-toggle"
                        title="Toggle dark mode">
                    <span x-show="!dark" class="text-xl">&#9789;</span>
                    <span x-show="dark" class="text-xl">&#9788;</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

        function initMermaid(isDark) {
            mermaid.initialize({
                startOnLoad: false,
                theme: isDark ? 'dark' : 'default',
                securityLevel: 'loose',
                flowchart: { useMaxWidth: true, htmlLabels: true },
            });
        }

        // Store original source BEFORE mermaid.run() replaces it with SVG.
        document.querySelectorAll('.mermaid').forEach(el => {
            if (!el.getAttribute('data-mermaid-src')) {
                el.setAttribute('data-mermaid-src', el.textContent.trim());
            }
        });

        initMermaid(document.documentElement.classList.contains('dark'));
        try {
            await mermaid.run();
        } catch (err) {
            console.error('[visualpy] Mermaid render failed:', err);
            document.querySelectorAll('.mermaid').forEach(el => {
                if (!el.querySelector('svg')) {
                    el.innerHTML = '<p class="text-sm text-red-600 dark:text-red-400">Diagram failed to render. Check browser console.</p>';
                }
            });
        }

        window.reRenderMermaid = async function(isDark) {
            initMermaid(isDark);
            document.querySelectorAll('.mermaid').forEach(el => {
                const code = el.getAttribute('data-mermaid-src');
                if (code) {
                    el.removeAttribute('data-processed');
                    el.innerHTML = code;
                }
            });
            try {
                await mermaid.run();
            } catch (err) {
                console.error('[visualpy] Mermaid re-render failed:', err);
                document.querySelectorAll('.mermaid').forEach(el => {
                    if (!el.querySelector('svg')) {
                        el.innerHTML = '<p class="text-sm text-red-600 dark:text-red-400">Diagram failed to re-render. Try refreshing the page.</p>';
                    }
                });
            }
        };

        window.mermaidModule = mermaid;
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
